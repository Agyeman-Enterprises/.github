name: Reusable Security Scan

# This is the MASTER security workflow for all Agyeman Enterprises repos.
# Repos call it with: uses: Agyeman-Enterprises/.github/.github/workflows/security-reusable.yml@main
#
# It handles:
#   - Python CVE scanning + auto-fix (pip-audit)
#   - npm CVE scanning + auto-fix (npm audit)
#   - Secret leak detection (Gitleaks)
#   - SAST (Semgrep — OWASP Top 10, language rulesets)
#   - Dependency review (blocks PRs that introduce known vulns)
#   - Auto-opens PRs when patches are available

on:
  workflow_call:
    inputs:
      has_python:
        type: boolean
        default: false
        description: "true if repo has requirements.txt"
      has_npm:
        type: boolean
        default: true
        description: "true if repo has package.json"
      npm_workspaces:
        type: string
        default: "."
        description: "Comma-separated list of npm workspace paths (e.g., 'frontend,dashboard')"
      semgrep_config:
        type: string
        default: "p/owasp-top-ten p/secrets"
        description: "Semgrep rulesets to use"
    secrets:
      SEMGREP_APP_TOKEN:
        required: false
      GITLEAKS_LICENSE:
        required: false

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  # ─── Python CVE Scan ────────────────────────────────────────────────────────
  python-audit:
    name: Python CVE Scan
    if: inputs.has_python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit -q

      - name: Scan + fix
        run: |
          pip-audit -r requirements.txt --format markdown > audit-report.md || true
          pip-audit -r requirements.txt --fix || true
          cat audit-report.md

      - name: PR if fixed
        if: github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(security): auto-patch Python CVEs [skip ci]"
          title: "🔒 Auto-patch Python CVEs"
          body: |
            **Automated security fix** — `pip-audit` detected and patched vulnerabilities in `requirements.txt`.

            Changes were auto-generated by the Agyeman Enterprises security scanner.
            Review the diff, confirm no breaking changes, then merge.
          branch: auto/python-cve-fix
          delete-branch: true
          add-paths: requirements.txt

  # ─── npm CVE Scan ───────────────────────────────────────────────────────────
  npm-audit:
    name: npm CVE Scan
    if: inputs.has_npm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJSON(format('[{0}]', inputs.npm_workspaces == '.' && '"."' || join(split(inputs.npm_workspaces, ','), '","'))) }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check workspace
        id: check
        run: |
          path="${{ matrix.workspace }}"
          if [ -f "${path%/}/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.workspace }}
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts --legacy-peer-deps

      - name: Audit
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.workspace }}
        run: |
          npm audit --audit-level=moderate 2>&1 | tee npm-audit-report.txt || true

      - name: Auto-fix
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.workspace }}
        run: npm audit fix --audit-level=moderate || true

      - name: PR if fixed
        if: steps.check.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(security): auto-patch npm CVEs in ${{ matrix.workspace }} [skip ci]"
          title: "🔒 Auto-patch npm CVEs (${{ matrix.workspace }})"
          body: |
            `npm audit fix` detected and patched vulnerabilities.
            Workspace: `${{ matrix.workspace }}`
          branch: auto/npm-cve-fix-${{ matrix.workspace }}
          delete-branch: true

  # ─── Dependency Review (PR guard) ───────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, Python-2.0

  # ─── Secret Leak Scanner ────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanner (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─── SAST — Semgrep ─────────────────────────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: ${{ inputs.semgrep_config }}
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true  # Free plans may not have Advanced Security
