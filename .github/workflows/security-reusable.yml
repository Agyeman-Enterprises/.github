name: Reusable Security Scan

# MASTER security workflow for all Agyeman Enterprises / IMHO-Media repos.
# Repos call it with:
#   uses: Agyeman-Enterprises/.github/.github/workflows/security-reusable.yml@main
#
# Zero external SaaS dependencies:
#   - Semgrep OSS (open source, no account/token needed)
#   - Gitleaks (open source)
#   - pip-audit (open source)
#   - npm audit (built-in npm)
#   - GitHub Dependency Review (built-in GitHub)

on:
  workflow_call:
    inputs:
      has_python:
        type: boolean
        default: false
      has_npm:
        type: boolean
        default: true
      npm_workspaces:
        type: string
        default: "."
      semgrep_config:
        type: string
        default: "auto"
    secrets:
      GITLEAKS_LICENSE:
        required: false

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  # ─── Python CVE Scan ────────────────────────────────────────────────────────
  python-audit:
    name: Python CVE Scan
    if: inputs.has_python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan + auto-fix
        run: |
          pip install pip-audit -q
          pip-audit -r requirements.txt --format markdown || true
          pip-audit -r requirements.txt --fix || true

      - name: Open fix PR if patched
        if: github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(security): auto-patch Python CVEs [skip ci]"
          title: "🔒 Auto-patch Python CVEs"
          body: |
            **pip-audit** detected and patched CVEs in `requirements.txt`.
            Review diff, confirm no breaking changes, then merge.
          branch: auto/python-cve-fix
          delete-branch: true
          add-paths: requirements.txt

  # ─── npm CVE Scan ───────────────────────────────────────────────────────────
  npm-audit:
    name: npm CVE Scan
    if: inputs.has_npm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: ${{ fromJSON(format('[{0}]', inputs.npm_workspaces == '.' && '"."' || join(split(inputs.npm_workspaces, ','), '","'))) }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check workspace
        id: check
        run: |
          path="${{ matrix.workspace }}"
          [ -f "${path%/}/package.json" ] && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT

      - name: Install
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.workspace }}
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts --legacy-peer-deps

      - name: Audit + auto-fix
        if: steps.check.outputs.exists == 'true'
        working-directory: ${{ matrix.workspace }}
        run: |
          npm audit --audit-level=moderate 2>&1 || true
          npm audit fix --audit-level=moderate || true

      - name: Open fix PR if patched
        if: steps.check.outputs.exists == 'true' && github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(security): auto-patch npm CVEs in ${{ matrix.workspace }} [skip ci]"
          title: "🔒 Auto-patch npm CVEs (${{ matrix.workspace }})"
          body: "`npm audit fix` patched vulnerabilities in `${{ matrix.workspace }}`."
          branch: auto/npm-cve-fix-${{ matrix.workspace }}
          delete-branch: true

  # ─── Dependency Review (blocks HIGH+ vuln PRs) ──────────────────────────────
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, Python-2.0

  # ─── Secret Leak Scanner (Gitleaks OSS) ─────────────────────────────────────
  secret-scan:
    name: Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─── SAST — Semgrep OSS (no account, no token) ──────────────────────────────
  sast:
    name: SAST (Semgrep OSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep OSS
        run: pip install semgrep -q

      - name: Run Semgrep scan
        env:
          SEMGREP_CONFIG: ${{ inputs.semgrep_config }}
        run: |
          CONFIG_FLAGS=""
          for cfg in $SEMGREP_CONFIG; do
            CONFIG_FLAGS="$CONFIG_FLAGS --config $cfg"
          done
          if [ -z "$CONFIG_FLAGS" ]; then
            CONFIG_FLAGS="--config auto"
          fi
          semgrep scan $CONFIG_FLAGS \
            --sarif \
            --output semgrep.sarif \
            --error \
            . 2>&1 || true

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true
