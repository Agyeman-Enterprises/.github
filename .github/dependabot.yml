# Org-level Dependabot config for Agyeman-Enterprises
# This file lives in the .github org repo and is referenced by individual repos.
# Each repo that wants Dependabot should copy/symlink this, or copy the relevant section.
#
# NOTE: GitHub does not support org-level dependabot.yml inheritance — each repo needs its own.
# This file serves as the canonical template. Copy it to any new repo's .github/dependabot.yml

version: 2

updates:
  # npm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Pacific/Guam"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"
    commit-message:
      prefix: "fix(deps)"
    reviewers: []
    ignore:
      # Only patch/minor auto-updates — major version bumps require manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Python pip packages
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Pacific/Guam"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"
    commit-message:
      prefix: "fix(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(actions)"
